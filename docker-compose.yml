# Frappe Fleet Management System - Simplified Docker Configuration
# Only essential services for initial setup
# ============================================================

services:
  # MariaDB Database
  mariadb:
    image: mariadb:10.11
    container_name: frappe_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for Cache
  redis-cache:
    image: redis:7-alpine
    container_name: frappe_redis_cache
    networks:
      - frappe_network
    restart: unless-stopped
    volumes:
      - redis_cache_data:/data

  # Redis for Queue
  redis-queue:
    image: redis:7-alpine
    container_name: frappe_redis_queue
    networks:
      - frappe_network
    restart: unless-stopped
    volumes:
      - redis_queue_data:/data

  # Backend - Main Frappe application (only this for now)
  backend:
    image: frappe/erpnext:${ERPNEXT_VERSION:-v16}
    platform: linux/amd64
    container_name: frappe_backend
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_CACHE: redis://frappe_redis_cache:6379
      REDIS_QUEUE: redis://frappe_redis_queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: unless-stopped

volumes:
  mariadb_data:
  redis_cache_data:
  redis_queue_data:
  sites:
  apps:

networks:
  frappe_network:
    driver: bridge
