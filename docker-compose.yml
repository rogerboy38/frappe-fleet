# Frappe Fleet Management System - Official frappe_docker Configuration
# Based on: https://github.com/frappe/frappe_docker
# ============================================================

services:
  # MariaDB Database
  mariadb:
    image: mariadb:10.11
    container_name: frappe_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: ${RESTART_POLICY:-unless-stopped}

  # Redis for Cache
  redis-cache:
    image: redis:7-alpine
    container_name: frappe_redis_cache
    networks:
      - frappe_network
    restart: ${RESTART_POLICY:-unless-stopped}
    volumes:
      - redis_cache_data:/data

  # Redis for Queue (also used for socketio)
  redis-queue:
    image: redis:7-alpine
    container_name: frappe_redis_queue
    networks:
      - frappe_network
    restart: ${RESTART_POLICY:-unless-stopped}
    volumes:
      - redis_queue_data:/data

  # Configurator - Sets up database and redis configuration
  configurator:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_configurator
    entrypoint: ["bash", "-c"]
    command:
      - |
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: 9000
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: on-failure

  # Backend - Main Frappe application
  backend:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_backend
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: ${RESTART_POLICY:-unless-stopped}

  # Frontend - Nginx web server
  frontend:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_frontend
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: ${FRAPPE_SITE_NAME_HEADER:-$$host}
      UPSTREAM_REAL_IP_ADDRESS: ${UPSTREAM_REAL_IP_ADDRESS:-127.0.0.1}
      UPSTREAM_REAL_IP_HEADER: ${UPSTREAM_REAL_IP_HEADER:-X-Forwarded-For}
      UPSTREAM_REAL_IP_RECURSIVE: ${UPSTREAM_REAL_IP_RECURSIVE:-off}
      PROXY_READ_TIMEOUT: ${PROXY_READ_TIMEOUT:-120}
      CLIENT_MAX_BODY_SIZE: ${CLIENT_MAX_BODY_SIZE:-50m}
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - frappe_network
    ports:
      - "${FRAPPE_PORT:-80}:80"
    depends_on:
      - backend
      - websocket
    restart: ${RESTART_POLICY:-unless-stopped}

  # Websocket - SocketIO server
  websocket:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_websocket
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: 9000
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: ${RESTART_POLICY:-unless-stopped}

  # Queue Short - Worker for short tasks
  queue-short:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_queue_short
    command: ["bench", "worker", "--queue", "short,default"]
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: ${RESTART_POLICY:-unless-stopped}

  # Queue Long - Worker for long-running tasks
  queue-long:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_queue_long
    command: ["bench", "worker", "--queue", "long,default,short"]
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: ${RESTART_POLICY:-unless-stopped}

  # Scheduler - Cron job scheduler
  scheduler:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_scheduler
    command: ["bench", "schedule"]
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: ${RESTART_POLICY:-unless-stopped}

  # phpMyAdmin (optional - for database management)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: frappe_phpmyadmin
    environment:
      - PMA_HOST=mariadb
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=${MARIADB_ROOT_PASSWORD}
      - PMA_ABSOLUTE_URI=http://${SERVER_IP}:${PHPMYADMIN_PORT:-8080}/
    networks:
      - frappe_network
    ports:
      - "${PHPMYADMIN_PORT:-8080}:80"
    depends_on:
      - mariadb
    restart: ${RESTART_POLICY:-unless-stopped}
    profiles:
      - tools

volumes:
  mariadb_data:
  redis_cache_data:
  redis_queue_data:
  sites:
  apps:

networks:
  frappe_network:
    driver: bridge
