# Frappe Fleet Management System - Simplified Docker Configuration
# ============================================================

services:
  # MariaDB Database
  mariadb:
    image: mariadb:10.11
    container_name: frappe_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MARIADB_DATABASE}
      MYSQL_USER: ${MARIADB_USER}
      MYSQL_PASSWORD: ${MARIADB_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - frappe_network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis for Cache
  redis-cache:
    image: redis:7-alpine
    container_name: frappe_redis_cache
    networks:
      - frappe_network
    restart: unless-stopped
    volumes:
      - redis_cache_data:/data

  # Redis for Queue
  redis-queue:
    image: redis:7-alpine
    container_name: frappe_redis_queue
    networks:
      - frappe_network
    restart: unless-stopped
    volumes:
      - redis_queue_data:/data

  # Configurator - Sets up bench configuration
  configurator:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_configurator
    entrypoint: ["bash", "-c"]
    command:
      - |
        ls -1 apps > sites/apps.txt 2>/dev/null || true;
        bench set-config -g db_host mariadb || true;
        bench set-config -gp db_port 3306 || true;
        bench set-config -g redis_cache "redis://frappe_redis_cache:6379" || true;
        bench set-config -g redis_queue "redis://frappe_redis_queue:6379" || true;
        bench set-config -g redis_socketio "redis://frappe_redis_queue:6379" || true;
        bench set-config -gp socketio_port 9000 || true;
        echo "Configurator completed"
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_CACHE: frappe_redis_cache:6379
      REDIS_QUEUE: frappe_redis_queue:6379
      SOCKETIO_PORT: 9000
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: "no"

  # Backend - Main Frappe application
  backend:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_backend
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_CACHE: redis://frappe_redis_cache:6379
      REDIS_QUEUE: redis://frappe_redis_queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: unless-stopped

  # Frontend - Nginx web server
  frontend:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_frontend
    command: ["nginx"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
    volumes:
      - sites:/home/frappe/frappe-bench/sites
    networks:
      - frappe_network
    ports:
      - "8083:80"
    depends_on:
      - backend
      - websocket
    restart: unless-stopped

  # Websocket - SocketIO server
  websocket:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_websocket
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_CACHE: frappe_redis_cache:6379
      REDIS_QUEUE: frappe_redis_queue:6379
      SOCKETIO_PORT: 9000
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    restart: unless-stopped

  # Queue Short - Worker for short tasks
  queue-short:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_queue_short
    command: ["bench", "worker", "--queue", "short,default"]
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_CACHE: frappe_redis_cache:6379
      REDIS_QUEUE: frappe_redis_queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      - mariadb
      - redis-cache
      - redis-queue
    restart: unless-stopped

  # Queue Long - Worker for long-running tasks
  queue-long:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_queue_long
    command: ["bench", "worker", "--queue", "long,default,short"]
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_CACHE: frappe_redis_cache:6379
      REDIS_QUEUE: frappe_redis_queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      - mariadb
      - redis-cache
      - redis-queue
    restart: unless-stopped

  # Scheduler - Cron job scheduler
  scheduler:
    image: ${CUSTOM_IMAGE:-frappe/erpnext}:${CUSTOM_TAG:-${ERPNEXT_VERSION:-v16}}
    platform: linux/amd64
    container_name: frappe_scheduler
    command: ["bench", "schedule"]
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_PASSWORD: ${MARIADB_PASSWORD}
      REDIS_CACHE: frappe_redis_cache:6379
      REDIS_QUEUE: frappe_redis_queue:6379
    volumes:
      - sites:/home/frappe/frappe-bench/sites
      - apps:/home/frappe/frappe-bench/apps
    networks:
      - frappe_network
    depends_on:
      configurator:
        condition: service_completed_successfully
      - mariadb
      - redis-cache
      - redis-queue
    restart: unless-stopped

volumes:
  mariadb_data:
  redis_cache_data:
  redis_queue_data:
  sites:
  apps:

networks:
  frappe_network:
    driver: bridge
